 <div class="hero-content">

   <script>
const texts = [
    "IT Specialist",
    "Cybersecurity Enthusiast",
    "Web Developer",
    "Virtual Assistant",
    "Logo Designer"
];

let i = 0;          // word index
let j = 0;          // letter index
let currentText = "";
let isDeleting = false;

function typeEffect() {
    currentText = texts[i];

    if (!isDeleting) {
        // Typing
        document.querySelector(".typing").textContent = currentText.substring(0, j + 1);
        j++;

        if (j === currentText.length) {
            isDeleting = true;
            setTimeout(typeEffect, 1200); // stay after full word
            return;
        }

    } else {
        // Deleting
        document.querySelector(".typing").textContent = currentText.substring(0, j - 1);
        j--;

        if (j === 0) {
            isDeleting = false;
            i++;
            if (i === texts.length) {
                i = 0; // restart
            }
        }
    }

    setTimeout(typeEffect, isDeleting ? 50 : 100);
}

typeEffect();
</script>
